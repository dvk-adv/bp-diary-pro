name: Update Copyright Year

on:
  schedule:
    - cron: '0 0 1 1 *' # 1 января в 00:00 UTC
  workflow_dispatch: # Для ручного запуска

jobs:
  update-year:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update year in ALL README.md files
        run: |
          CURRENT_YEAR=$(date +%Y)
          # Находим все файлы README.md в любой папке и заменяем [202X] на текущий год
          find . -type f -name "README.md" -exec sed -i "s/\[[0-9]\{4\}\]/[$CURRENT_YEAR]/g" {} +

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем в индекс только те README.md, которые были изменены
          git add $(find . -type f -name "README.md")
          
          # Проверяем, есть ли реальные изменения
          if ! git diff --staged --quiet; then
            CURRENT_YEAR=$(date +%Y)
            git commit -m "chore: автоматическое обновление года на $CURRENT_YEAR"
            git push
            echo "✅ Год успешно обновлен во всех файлах README.md"
          else
            echo "ℹ️ Изменений не найдено, год уже актуален."
          fi
